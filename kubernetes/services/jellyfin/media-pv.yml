apiVersion: v1
kind: PersistentVolume
metadata:
  name: media-library
spec:
  capacity:
    storage: 8Ti   # symbolic for NFS — not enforced, just informational
  accessModes:
    - ReadWriteMany   # many pods/nodes read the same real data, nothing duplicated
  persistentVolumeReclaimPolicy: Retain   # never let k8s delete real media on PVC teardown
  nfs:
    server: nfs-server.lan
    path: /media
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-library
  namespace: jellyfin
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""   # empty on purpose — binds to the static PV above, no dynamic provisioner involved
  resources:
    requests:
      storage: 8Ti
  volumeName: media-library
