apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: jellyfin
  labels:
    app: jellyfin
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      securityContext:
        runAsUser: 1001
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: jellyfin
          image: jellyfin/jellyfin:latest
          env:
            - name: JELLYFIN_BIND_ADDR
              value: "0.0.0.0"
            - name: JELLYFIN_DATA_DIR
              value: "/config"
            - name: JELLYFIN_CACHE_DIR
              value: "/cache"
            - name: JELLYFIN_CONFIG_DIR
              value: "/config/config"
            - name: JELLYFIN_LOG_DIR
              value: "/config/log"
            - name: JELLYFIN_WEB_DIR
              value: "/jellyfin/jellyfin-web"
            - name: JELLYFIN_FFMPEG
              value: "/usr/lib/jellyfin-ffmpeg/ffmpeg"
            - name: XDG_CACHE_HOME
              value: "/cache"
          ports:
            - containerPort: 8096
              name: http
          volumeMounts:
            - name: config
              mountPath: /config
            - name: cache
              mountPath: /cache
            - name: media
              mountPath: /media
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8096
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "4"
              memory: 4Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: jellyfin-config
        - name: cache
          persistentVolumeClaim:
            claimName: jellyfin-cache
        - name: media
          persistentVolumeClaim:
            claimName: media-library
