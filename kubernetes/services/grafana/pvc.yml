apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: observability
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn   # standard 3-replica class — plenty of headroom now
  resources:
    requests:
      storage: 5Gi   # dashboards/config/sqlite db — small footprint
