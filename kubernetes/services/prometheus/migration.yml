apiVersion: batch/v1
kind: Job
metadata:
  name: prometheus-data-migration
  namespace: observability
spec:
  template:
    spec:
      restartPolicy: Never
      # Must run on ukko-server-1 since that's where the old data physically lives.
      # Run this BEFORE decommissioning the node, and only once.
      nodeSelector:
        kubernetes.io/hostname: ukko-server-1
      containers:
        - name: migrate
          image: alpine:latest
          command:
            - sh
            - -c
            - |
              apk add --no-cache rsync
              echo "Copying old Prometheus data into new PVC..."
              rsync -av --progress /old-data/ /new-data/
              echo "Done. Verify contents before deleting the old directory."
          volumeMounts:
            - name: old-data
              mountPath: /old-data
              readOnly: true
            - name: new-data
              mountPath: /new-data
      volumes:
        - name: old-data
          hostPath:
            path: /prod/deploy.home-server/services/prometheus/data
            type: Directory
        - name: new-data
          persistentVolumeClaim:
            claimName: prometheus-data
  backoffLimit: 1
