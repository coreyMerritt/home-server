apiVersion: batch/v1
kind: CronJob
metadata:
  name: prometheus-data-backup
  namespace: observability
spec:
  schedule: "0 4 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: instrumentisto/rsync-ssh:latest
              command:
                - sh
                - -c
                - |
                  set -euo pipefail
                  mkdir -p "$DESTINATION"
                  rsync -a --delete --backup --backup-dir="${DESTINATION}/.deleted/$(date +%Y-%m-%d_%H-%M-%S_%Z)" /source/ "${DESTINATION}/"
                  echo "Synced $(date) -- $(du -sh "${DESTINATION}" | cut -f1)"
              env:
                - name: DESTINATION
                  value: "/backup/prometheus/data"
                - name: TZ
                  value: "America/New_York"
              volumeMounts:
                - name: source
                  mountPath: /source
                  readOnly: true
                - name: backup-target
                  mountPath: /backup
          volumes:
            - name: source
              persistentVolumeClaim:
                claimName: prometheus-data
            - name: backup-target
              nfs:
                server: nfs-server.lan
                path: /misc/prod-data-backups
