apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: observability
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s

    scrape_configs:
      - job_name: "kubernetes-node-exporter"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - observability
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: node-exporter
            action: keep
          - source_labels: [__meta_kubernetes_pod_host_ip]
            action: replace
            regex: (.+)
            target_label: __address__
            replacement: "${1}:9100"
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
      - job_name: "node"
        static_configs:
          - targets:
              - "dns-server.lan:9100"
              - "lucy-steve.lan:9100"
              - "nfs-server.lan:9100"
              - "proxmox-1.lan:9100"
              - "proxmox-2.lan:9100"
              - "ukko-development-pc.lan:9100"
              - "ukko-media-client-1.lan:9100"
              - "ukko-media-client-2.lan:9100"
              - "ukko-media-client-3.lan:9100"
              - "ukko-server-1.lan:9100"
      - job_name: "windows"
        static_configs:
          - targets:
              - "ukko-ukonvasara.lan:9182"
