apiVersion: batch/v1
kind: CronJob
metadata:
  name: sc2-data-manager-game-files-backup
  namespace: sc2
spec:
  schedule: "0 7 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: instrumentisto/rsync-ssh:latest
              command:
                - sh
                - -c
                - |
                  set -euo pipefail
                  mkdir --parents "$DESTINATION"
                  rsync \
                    --archive \
                    --delete \
                    --backup \
                    --backup-dir "${BACKUP_DIR}/$(date +%Y-%m-%d_%H-%M-%S_%Z)" \
                    "${SOURCE}/" \
                    "${DESTINATION}/"
                  echo "Synced $(date) -- $(du -sh "${DESTINATION}" | cut -f1)"
              env:
                - name: SOURCE
                  value: "/prod-data"
                - name: DESTINATION
                  value: "/prod-data-backups/sc2-data-manager/game-files"
                - name: BACKUP_DIR
                  value: "/prod-data-backups/sc2-data-manager/game-files.deleted"
                - name: TZ
                  value: "America/New_York"
              volumeMounts:
                - name: prod-data
                  mountPath: /prod-data
                  readOnly: true
                - name: prod-data-backups
                  mountPath: /prod-data-backups
          volumes:
            - name: prod-data
              persistentVolumeClaim:
                claimName: sc2-data-manager-game-files
            - name: prod-data-backups
              nfs:
                server: nfs-server.lan
                path: /misc/prod-data-backups
