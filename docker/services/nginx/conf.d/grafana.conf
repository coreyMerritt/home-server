server {
    listen 80;
    server_name grafana.lan;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;

    server_name grafana.lan;

    ssl_certificate /etc/nginx/certs/grafana.lan.pem;
    ssl_certificate_key /etc/nginx/certs/grafana.lan-key.pem;

    location / {
        proxy_pass http://grafana:3000;
        include /etc/nginx/snippets/proxy.conf;
    }
}
