server {
    listen 80;
    server_name sc2-data-manager.lan;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;

    server_name sc2-data-manager.lan;

    ssl_certificate /etc/nginx/certs/sc2-data-manager.lan.pem;
    ssl_certificate_key /etc/nginx/certs/sc2-data-manager.lan-key.pem;

    location / {
        proxy_pass http://sc2-data-manager:23231;
        include /etc/nginx/snippets/proxy.conf;
    }
}
